# Sample OpenAPI 3.0 spec for testing the generator.
# This is a simplified Petstore API — a classic API testing target.
# Use this to test your generator before pointing it at real specs.

openapi: 3.0.3
info:
  title: Petstore Sample API
  version: 1.0.0
  description: Sample API for testing the AI test generator

servers:
  - url: https://petstore3.swagger.io/api/v3

paths:
  /pet:
    post:
      operationId: addPet
      summary: Add a new pet to the store
      tags: [pet]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Pet'
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '405':
          description: Invalid input

  /pet/{petId}:
    get:
      operationId: getPetById
      summary: Find pet by ID
      tags: [pet]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'
        '404':
          description: Pet not found

    delete:
      operationId: deletePet
      summary: Deletes a pet
      tags: [pet]
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation
        '400':
          description: Invalid pet value

  /pet/findByStatus:
    get:
      operationId: findPetsByStatus
      summary: Finds Pets by status
      tags: [pet]
      parameters:
        - name: status
          in: query
          required: true
          schema:
            type: string
            enum: [available, pending, sold]
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Pet'
        '400':
          description: Invalid status value

  /user:
    post:
      operationId: createUser
      summary: Create user
      tags: [user]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Successful operation

  /user/{username}:
    get:
      operationId: getUserByName
      summary: Get user by user name
      tags: [user]
      parameters:
        - name: username
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

components:
  schemas:
    Pet:
      type: object
      required: [name, photoUrls]
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          example: doggie
        status:
          type: string
          enum: [available, pending, sold]
        photoUrls:
          type: array
          items:
            type: string

    User:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
