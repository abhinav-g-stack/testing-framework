# Development environment configuration
# Usage: mvn test -Denv=dev (or just mvn test — dev is the default)
#
# Switched from Reqres.in to JSONPlaceholder because Reqres.in
# added Cloudflare protection that blocks non-browser HTTP clients.
# JSONPlaceholder is free, no auth required, no rate limits.

base.url=https://jsonplaceholder.typicode.com
request.timeout=5000
retry.count=2

# Logging level for RestAssured
log.request=true
log.response=true
